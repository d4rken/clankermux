name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

jobs:
  lint:
    name: Lint & format (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      # `biome ci` is the read-only counterpart to the local `bun run lint`
      # (which uses --write --unsafe). It checks formatting + lint rules and
      # fails on errors without mutating any files.
      - run: bunx --bun biome ci .

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      # The 5 gitignored inline worker files are absent on a fresh checkout;
      # write empty placeholders so tsc can resolve their imports.
      - run: bash .github/scripts/gen-autogen-placeholders.sh
      # apps/server imports the gitignored dashboard build artifacts
      # (dist/embedded.ts, dist/manifest.json); generate them (~1s).
      - run: bun run build:dashboard
      - run: bun run typecheck

  test:
    name: Unit tests (bun test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bash .github/scripts/gen-autogen-placeholders.sh
      # The --serve CLI test boots the server, which imports the dashboard
      # build artifacts; without them that test hangs to timeout.
      - run: bun run build:dashboard
      - run: bun test

  audit:
    name: Dependency audit (bun audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      # Exact-pinned deps never auto-update, so a published advisory would
      # otherwise sit silently. Fail the build on high/critical vulns; lower
      # severities are tracked by Dependabot (.github/dependabot.yml).
      - run: bun audit --audit-level=high
